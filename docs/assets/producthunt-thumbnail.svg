<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">Channel Vault NAS Product Hunt thumbnail</title>
  <desc id="desc">A compact Channel Vault NAS app icon with a vault mark, video archive signal, and NAS storage bars.</desc>
  <defs>
    <linearGradient id="bg" x1="24" x2="216" y1="14" y2="226">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#0b1726"/>
      <stop offset="1" stop-color="#071a18"/>
    </linearGradient>
    <linearGradient id="ring" x1="54" x2="186" y1="52" y2="188">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.48" stop-color="#34d399"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="panel" x1="70" x2="170" y1="76" y2="164">
