  <text x="120" y="202" text-anchor="middle" fill="#d8f7ee" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="900" letter-spacing="0">NAS</text>

