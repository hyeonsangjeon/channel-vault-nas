    <circle cx="120" cy="112" r="49" fill="url(#panel)" stroke="#233c55" stroke-width="2"/>
    <path d="M88 91h31l10 10h23c8 0 14 6 14 14v32c0 8-6 14-14 14H88c-8 0-14-6-14-14v-42c0-8 6-14 14-14z" fill="#0d1c2f" stroke="#38bdf8" stroke-width="3"/>
