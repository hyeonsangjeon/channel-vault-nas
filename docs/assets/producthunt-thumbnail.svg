  <path d="M-16 182C29 155 63 190 107 164C153 137 186 158 257 112" fill="none" stroke="#123f53" stroke-width="3" opacity="0.9"/>
  <path d="M-8 204C42 180 77 209 123 184C165 160 199 181 249 150" fill="none" stroke="#164532" stroke-width="3" opacity="0.82"/>

