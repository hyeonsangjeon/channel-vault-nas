<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Channel Vault NAS social preview</title>
  <desc id="desc">Dark NAS archive cockpit preview with queue, storage, and library panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06070c"/>
      <stop offset="0.55" stop-color="#0b111a"/>
      <stop offset="1" stop-color="#081015"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 520 C180 455 270 585 450 525 C675 450 830 575 1200 430 L1200 630 L0 630 Z" fill="#07131d" opacity="0.9"/>
  <path d="M58 74 H1142" stroke="#172030" stroke-width="2"/>
  <path d="M58 560 H1142" stroke="#172030" stroke-width="2"/>

  <g transform="translate(76 82)">
    <rect width="164" height="42" rx="12" fill="#101823" stroke="#263448"/>
    <path d="M28 16h32v18H28z" fill="#111620" stroke="#38bdf8" stroke-width="3"/>
    <path d="M33 10h21l6 6H28z" fill="#34d399"/>
    <circle cx="38" cy="26" r="3" fill="#f59e0b"/>
    <circle cx="50" cy="26" r="3" fill="#a78bfa"/>
    <text x="74" y="27" fill="#e5edf7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">Channel Vault</text>
  </g>

  <g transform="translate(76 170)">
    <text x="0" y="0" fill="#38bdf8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="700">NAS-first archive cockpit</text>
    <text x="0" y="64" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="54" font-weight="800">Sync channels.</text>
    <text x="0" y="130" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="54" font-weight="800">Skip known videos.</text>
    <text x="0" y="196" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="54" font-weight="800">Recover from disk.</text>
    <text x="2" y="258" fill="#aab6c7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="21">archive.txt ledgers, guarded queues, recoverable media</text>
  </g>

  <g transform="translate(742 116)" filter="url(#soft-shadow)">
    <rect width="384" height="380" rx="22" fill="#0d141f" stroke="#233044"/>
    <rect x="22" y="24" width="340" height="74" rx="16" fill="#121c29" stroke="#24374b"/>
    <text x="44" y="57" fill="#9fb0c5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">ARCHIVE SCORE</text>
    <text x="44" y="86" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="800">91</text>
    <rect x="112" y="67" width="224" height="10" rx="5" fill="#1f2a3a"/>
    <rect x="112" y="67" width="190" height="10" rx="5" fill="url(#cyan)"/>

    <g transform="translate(22 124)">
      <rect width="104" height="92" rx="16" fill="#101923" stroke="#24364a"/>
      <text x="17" y="32" fill="#90a2b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">SYNC</text>
      <text x="17" y="66" fill="#38bdf8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="800">3</text>
    </g>
    <g transform="translate(140 124)">
      <rect width="104" height="92" rx="16" fill="#101923" stroke="#24364a"/>
      <text x="17" y="32" fill="#90a2b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">QUEUE</text>
      <text x="17" y="66" fill="#34d399" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="800">12</text>
    </g>
    <g transform="translate(258 124)">
      <rect width="104" height="92" rx="16" fill="#101923" stroke="#24364a"/>
      <text x="17" y="32" fill="#90a2b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">DRIFT</text>
      <text x="17" y="66" fill="#f59e0b" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="800">2</text>
    </g>

    <g transform="translate(22 244)">
      <rect width="340" height="104" rx="16" fill="#101923" stroke="#24364a"/>
      <path d="M28 70 C65 34 98 50 130 42 C178 30 204 80 244 50 C280 23 305 31 324 20" fill="none" stroke="url(#cyan)" stroke-width="5" stroke-linecap="round"/>
      <path d="M28 84 C70 70 92 90 126 74 C170 52 205 72 238 65 C282 57 306 76 324 58" fill="none" stroke="url(#violet)" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
      <circle cx="244" cy="50" r="7" fill="#34d399"/>
      <circle cx="324" cy="20" r="7" fill="#38bdf8"/>
    </g>
  </g>

  <g transform="translate(76 520)">
    <rect width="184" height="42" rx="21" fill="#102033" stroke="#28506c"/>
    <text x="24" y="27" fill="#c7f9ff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">Guarded by default</text>
    <rect x="204" width="196" height="42" rx="21" fill="#10241c" stroke="#266044"/>
    <text x="228" y="27" fill="#cfffe6" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">Sidecar recoverable</text>
    <rect x="420" width="156" height="42" rx="21" fill="#201a2e" stroke="#554478"/>
    <text x="444" y="27" fill="#eee5ff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">NAS local-first</text>
  </g>
</svg>
