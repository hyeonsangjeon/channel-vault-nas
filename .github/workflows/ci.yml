name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Ruff
        working-directory: backend
        run: .venv/bin/ruff check app tests scripts

      - name: Pytest
        working-directory: backend
        run: .venv/bin/pytest tests -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Locale key consistency
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const files = ["en", "ko", "ja", "zh", "hi"].map((lang) => `frontend/src/locales/${lang}.json`);
          const entries = files.map((file) => [file, Object.keys(JSON.parse(fs.readFileSync(file, "utf8"))).sort()]);
          const base = entries[0][1];
          for (const [file, keys] of entries) {
            const missing = base.filter((key) => !keys.includes(key));
            const extra = keys.filter((key) => !base.includes(key));
            if (missing.length || extra.length) {
              console.error(file, { missing, extra });
              process.exit(1);
            }
          }
          console.log(`ok: ${base.length} locale keys across ${files.length} languages`);
          NODE

      - name: Build
        working-directory: frontend
        run: npm run build

  browser-smoke:
    name: Browser smoke
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run isolated browser smoke
        working-directory: frontend
        run: npm run e2e:smoke -- --project=chromium

      - name: Run protected browser smoke
        working-directory: frontend
        env:
          CVN_E2E_AUTH_TOKEN: cvn-ci-operator-token
        run: npm run e2e:auth -- --project=chromium
