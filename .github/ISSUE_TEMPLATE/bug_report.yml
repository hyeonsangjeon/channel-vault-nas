name: Bug report
description: Report a reproducible Channel Vault NAS bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not paste private archive paths, source URLs, or logs unless you have checked them first.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
      placeholder: The queue page shows...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps or commands.
      placeholder: |
        1. Start with...
        2. Open...
        3. Click...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Dashboard
        - Channels
        - Queue
        - Library
        - Insights
        - Settings/runtime
        - Backend/API
        - Docker/Compose
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, install method, branch/tag, Python/Node versions if local dev.
      placeholder: macOS 15, Chrome, Docker Compose, branch main...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact private paths, channel URLs, and source identifiers first.
      render: shell
